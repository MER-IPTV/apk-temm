<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Now - Firebase Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* حاوية الهاتف */
        .app-container {
            width: 100%;
            max-width: 412px;
            height: 880px;
            background-color: #000000;
            overflow-y: auto;
            position: relative;
            padding-bottom: 90px;
        }

        .app-container::-webkit-scrollbar { width: 0px; }

        /* الهيدر العلوي */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 15px 10px 15px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header .right-icons, .header .left-icons {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header i { font-size: 20px; cursor: pointer; color: #fff; }

        /* شريط البحث */
        .search-container { padding: 10px 15px; margin-bottom: 15px; }
        .search-bar {
            display: flex;
            align-items: center;
            background-color: #1c1c1e;
            padding: 12px 15px;
            border-radius: 18px;
        }
        .search-bar input {
            background: none;
            border: none;
            color: #a1a1a6;
            margin-right: 10px;
            width: 100%;
            outline: none;
            font-size: 16px;
        }
        .search-bar i { color: #fff; font-size: 18px; }
        .search-bar .fa-xmark { color: #8e8e93; font-size: 16px; cursor: pointer; }

        /* العناوين الجانبية */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin-top: 10px;
        }
        .section-title { font-size: 19px; font-weight: 700; color: #fff; }
        .see-more { color: #00e5ff; font-size: 14px; font-weight: 600; text-decoration: none; }

        /* الدوريات الكبرى (سلايدر أفقي) */
        .leagues-scroll {
            display: flex;
            gap: 15px;
            padding: 10px 15px;
            overflow-x: auto;
        }
        .leagues-scroll::-webkit-scrollbar { display: none; }
        .league-item { display: flex; flex-direction: column; align-items: center; min-width: 72px; }
        .league-logo {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(255,255,255,0.1);
        }
        .league-logo img { width: 70%; height: 70%; object-fit: contain; }
        .league-item span { font-size: 13px; color: #fff; text-align: center; font-weight: 600; }

        /* سلايدر مباريات اليوم */
        .matches-slider {
            display: flex;
            gap: 15px;
            padding: 10px 15px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .matches-slider::-webkit-scrollbar { display: none; }

        /* كارت المباراة المعدل ليتناسب مع البيانات المجلوبة */
        .match-card {
            background-color: #121212;
            border-radius: 16px;
            min-width: 350px;
            scroll-snap-align: start;
            border: 1px solid #1c1c1e;
        }
        .match-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1c1c1e;
            padding: 10px 15px;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            font-size: 14px;
            color: #fff;
            font-weight: 600;
        }
        .match-card-header .league-name { display: flex; align-items: center; gap: 6px; }
        .match-card-body { padding: 20px 15px; }
        .match-teams { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; flex-direction: column; align-items: center; width: 35%; }
        .team img { width: 55px; height: 55px; object-fit: contain; margin-bottom: 8px; background-color: rgba(255,255,255,0.05); border-radius: 50%; padding: 4px; }
        .team-name { font-size: 14px; font-weight: 700; text-align: center; color: #fff; }
        
        .match-center { text-align: center; width: 30%; }
        .vs { font-size: 20px; font-weight: 700; color: #8e8e93; margin-bottom: 4px; }
        .time-badge {
            border: 2px solid #00e5ff;
            color: #00e5ff;
            background: transparent;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            display: inline-block;
            direction: ltr;
            white-space: nowrap;
        }
        .time-badge.live {
            border-color: #ff3b30;
            color: #ff3b30;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .match-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-top: 1px solid #1c1c1e;
            font-size: 13px;
            color: #fff;
        }
        .footer-item { display: flex; align-items: center; gap: 8px; }
        .footer-item i { color: #8e8e93; font-size: 15px; }

        /* أزرار التنقل السفلية */
        .bottom-nav {
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 75px;
            background-color: #121212;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #1c1c1e;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; text-decoration: none; font-size: 12px; font-weight: 600; }
        .nav-item.active { color: #00e5ff; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }

        /* أقسام إضافية */
        .upcoming-leagues { display: flex; gap: 10px; padding: 5px 15px 15px 15px; overflow-x: auto; }
        .upcoming-badge { background-color: #121212; padding: 10px 15px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; border: 1px solid #1c1c1e; min-width: 120px; }

        .all-matches-btn { background-color: #121212; border: 1px solid #1c1c1e; padding: 12px; border-radius: 12px; text-align: center; margin: 0 15px 15px 15px; font-weight: 700; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header">
        <div class="right-icons">
            <i class="fa-solid fa-list-ul"></i>
            <i class="fa-solid fa-rotate" onclick="getFirebaseMatches()"></i>
        </div>
        <h1>Match Now</h1>
        <div class="left-icons">
            <i class="fa-regular fa-calendar-minus"></i>
        </div>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search....">
            <i class="fa-solid fa-xmark"></i>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">Big Leagues</div>
    </div>
    <div class="leagues-scroll">
        <div class="league-item">
            <div class="league-logo"><img src="https://media.api-football.com/leagues/39.png"></div>
            <span>Premier Lg</span>
        </div>
        <div class="league-item">
            <div class="league-logo"><img src="https://media.api-football.com/leagues/140.png"></div>
            <span>La Liga</span>
        </div>
        <div class="league-item">
            <div class="league-logo"><img src="https://media.api-football.com/leagues/135.png"></div>
            <span>Serie A</span>
        </div>
        <div class="league-item">
            <div class="league-logo"><img src="https://media.api-football.com/leagues/78.png"></div>
            <span>Bundesliga</span>
        </div>
        <div class="league-item">
            <div class="league-logo"><img src="https://media.api-football.com/leagues/61.png"></div>
            <span>Ligue 1</span>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">Today's Matches</div>
    </div>
    
    <!-- حاوية عرض المباريات المجلوبة ديناميكياً -->
    <div class="matches-slider" id="apiMatchesContainer">
        <div style="padding: 20px; color: #8e8e93;">جاري تحميل مباريات Firebase الحية...</div>
    </div>

    <div class="section-header">
        <div class="section-title">Upcoming Match</div>
        <a href="#" class="see-more">See more</a>
    </div>
    
    <div class="upcoming-leagues">
        <div class="upcoming-badge"><img src="https://media.api-football.com/leagues/135.png" width="18"> Serie A</div>
        <div class="upcoming-badge"><img src="https://media.api-football.com/leagues/78.png" width="18"> Bundesliga</div>
        <div class="upcoming-badge"><img src="https://media.api-football.com/leagues/61.png" width="18"> Ligue 1</div>
    </div>

    <div class="all-matches-btn">جميع المباريات</div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house-chimney-window"></i><span>Home</span></div>
        <div class="nav-item"><i class="fa-solid fa-running"></i><span>Match Goals</span></div>
        <div class="nav-item"><i class="fa-solid fa-trophy"></i><span>Championships</span></div>
        <div class="nav-item"><i class="fa-solid fa-tv"></i><span>Live TV</span></div>
    </div>

</div>

<script>
    // رابط الـ API المستخرج الخاص بك من Firebase
    const firebaseJsonUrl = "https://frsin-araq-default-rtdb.firebaseio.com/matches.json";

    // دوال مساعدة لضمان قراءة المسميات المختلفة من الكود الأول وتجنب الأخطاء الفنية
    const getHomeName = m => m.home || m.home_name || m.homeName || "المستضيف";
    const getAwayName = m => m.away || m.away_name || m.awayName || "الضيف";
    const getHomeLogo = m => m.homeLogo || m.home_logo || 'https://via.placeholder.com/55/222/fff?text=H';
    const getAwayLogo = m => m.awayLogo || m.away_logo || 'https://via.placeholder.com/55/222/fff?text=A';

    // التحقق من حالة المباراة بناءً على لوحة التحكم الأصلية لديك
    function getMatchStatus(m) {
        const s = Number(m.status ?? m.match_status ?? 0);
        const txt = String(m.statusText || m.status_text || "");

        if (txt.includes("انتهت") || s === 4) {
            return { text: "انتهت", isLive: false };
        }
        if (txt.includes("جارية") || txt.includes("مباشر") || [1, 2, 3].includes(s)) {
            return { text: "مباشر 🔴", isLive: true };
        }
        return { text: txt || "لم تبدأ", isLive: false };
    }

    // جلب سكور الأهداف الحالي
    function getScore(m) {
        const h = String(m.homeScore ?? m.home_scores ?? "").trim();
        const a = String(m.awayScore ?? m.away_scores ?? "").trim();
        return (h === "" || h === "-") ? "VS" : `${h} - ${a}`;
    }

    // دالة الاتصال الفعلي بالخادم وبناء الكروت
    async function getFirebaseMatches() {
        const slider = document.getElementById('apiMatchesContainer');
        
        try {
            const response = await fetch(firebaseJsonUrl);
            if (!response.ok) throw new Error(`خطأ اتصال: ${response.status}`);
            
            const data = await response.json();
            if (!data) {
                slider.innerHTML = "<div style='padding:20px; color:#8e8e93;'>لا توجد مباريات مدرجة حالياً</div>";
                return;
            }

            // تحويل الـ Object القادم من Firebase إلى مصفوفة وفلترة المنشورة فقط (published)
            const matchesList = Object.values(data).filter(m => m && (m.published === true || String(m.published) === "true"));

            if (matchesList.length === 0) {
                slider.innerHTML = "<div style='padding:20px; color:#8e8e93;'>لا توجد مباريات منشورة اليوم</div>";
                return;
            }

            // ترتيب المباريات: (المباشرة أولاً، ثم المجدولة، ثم المنتهية)
            matchesList.sort((a, b) => {
                const statusA = getMatchStatus(a);
                const statusB = getMatchStatus(b);
                return statusB.isLive - statusA.isLive;
            });

            // مسح الحاوية استعداداً لضخ البيانات الحقيقية
            slider.innerHTML = ''; 

            // تدوير البيانات وبناء الكروت الموافقة للتصميم الجديد
            matchesList.forEach(match => {
                const card = document.createElement('div');
                card.className = 'match-card';
                
                const statusInfo = getMatchStatus(match);
                const badgeClass = statusInfo.isLive ? 'time-badge live' : 'time-badge';
                
                // تحديد النص في الوسط (إذا كانت مباشرة يظهر السكور، وإذا كانت لم تبدأ يظهر وقت المباراة)
                const centerDisplay = statusInfo.isLive ? getScore(match) : (match.time || match.match_time || "00:00");
                const channelText = match.channel || match.channel_name || "قناة صوتية";
                const commentatorText = match.commentator || match.commentator_name || "معلق اللقاء";
                const leagueNameText = match.league || match.league_name || "بطولة كروية";

                card.innerHTML = `
                    <div class="match-card-header">
                        <span>${statusInfo.text}</span>
                        <span class="league-name"><i class="fa-solid fa-trophy" style="color: #fff;"></i> ${leagueNameText}</span>
                    </div>
                    <div class="match-card-body">
                        <div class="match-teams">
                            <div class="team">
                                <img src="${getHomeLogo(match)}" onerror="this.src='https://via.placeholder.com/55/222/fff?text=Team'">
                                <div class="team-name">${getHomeName(match)}</div>
                            </div>
                            <div class="match-center">
                                <div class="vs">${statusInfo.isLive ? 'جارية الآن' : 'VS'}</div>
                                <div class="${badgeClass}">${centerDisplay}</div>
                            </div>
                            <div class="team">
                                <img src="${getAwayLogo(match)}" onerror="this.src='https://via.placeholder.com/55/222/fff?text=Team'">
                                <div class="team-name">${getAwayName(match)}</div>
                            </div>
                        </div>
                    </div>
                    <div class="match-card-footer">
                        <div class="footer-item"><i class="fa-solid fa-microphone"></i> <span>${commentatorText}</span></div>
                        <div class="footer-item"><span>${channelText}</span> <i class="fa-solid fa-tv"></i></div>
                    </div>
                `;
                slider.appendChild(card);
            });

        } catch (error) {
            console.error("Firebase Fetch Error:", error);
            slider.innerHTML = "<div style='padding:15px; color:#ff3b30;'>عذراً، فشل جلب البيانات من خادم Firebase</div>";
        }
    }

    // تفعيل عملية الجلب الفوري لحظة تحميل التطبيق
    window.onload = getFirebaseMatches;
</script>

</body>
</html>
