<html dir='rtl' lang='ar' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/2005/gml/b' xmlns:data='http://www.google.com/2005/gml/data' xmlns:expr='http://www.google.com/2005/gml/expr'>
<head>
    <meta charset='UTF-8'/>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no' name='viewport'/>
    <title>البصري تيفي - جدول مباريات اليوم</title>
    
    <link href='https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&amp;display=swap' rel='stylesheet'/>
    <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css' rel='stylesheet'/>
    <script src='https://cdn.jsdelivr.net/npm/hls.js@latest'></script>

    <b:skin><![CDATA[
        /* تصفير الهوامش وضمان عمل الخلفية المارونية العميقة لكأس العالم */
        body {
            margin: 0 !important;
            padding: 0 !important;
            background: #2c0216 !important;
            color: #ffffff;
            font-family: 'Tajawal', sans-serif !important;
        }
        /* إخفاء إضافات بلوجر الافتراضية لعرض كامل واحترافي */
        .navbar, #navbar-iframe, .footer-section, .quickedit, .post-feeds { display: none !important; }
    ]]></b:skin>
    
    <style>
        :root {
            --qatar-maroon: #56042c;   /* العنابي القطري */
            --qatar-dark: #2c0216;     /* الماروني الغامق للخلفية الخلفية */
            --qatar-gold: #bcc695;     /* الذهبي الهادئ للأطر والأيقونات */
            --card-white: #ffffff;     /* خلفية الكروت البيضاء الدائرية */
            --text-dark: #2c2c2c;      /* لون نصوص الفرق */
            --time-red: #e50914;       /* الأحمر الناري للوقت والنتيجة */
            --text-gray: #a0aec0;
        }

        body {
            background-color: var(--qatar-dark) !important;
            background-image: radial-gradient(circle at 50% 0%, rgba(86, 4, 44, 0.6) 0%, transparent 75%) !important;
            min-height: 100vh;
        }

        #app-dynamic-wrapper {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            padding: 30px 15px;
            box-sizing: border-box;
        }

        /* الهيدر العلوي لجدول المباريات */
        .header-table {
            text-align: center;
            margin-bottom: 35px;
        }

        .main-header-title {
            background: var(--time-red);
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 900;
            padding: 10px 40px;
            border-radius: 50px;
            display: inline-block;
            margin: 0 0 12px 0;
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .date-sub {
            background: var(--qatar-gold);
            color: var(--qatar-dark);
            font-weight: 700;
            padding: 5px 20px;
            border-radius: 6px;
            display: inline-block;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* فواصل البطولات والمجموعات */
        .section-divider {
            text-align: center;
            color: var(--qatar-gold);
            font-size: 0.95rem;
            font-weight: 700;
            margin: 25px 0 10px 0;
            letter-spacing: 0.5px;
        }

        /* كرت المباراة الدائري والبيضاوي الانسيابي */
        .match-card {
            background: var(--card-white);
            border-radius: 50px; 
            display: grid;
            grid-template-columns: 1fr 120px 1fr;
            align-items: center;
            padding: 8px 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 5px;
            border: 2px solid transparent;
            box-sizing: border-box;
        }

        .match-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.45);
            border-color: var(--qatar-gold);
        }

        .match-card.static-card {
            cursor: default;
            transform: none !important;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3) !important;
            border-color: var(--qatar-gold);
        }

        /* تنسيق أسماء الفرق والشعارات */
        .team {
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 700;
            color: var(--text-dark);
            font-size: 1.05rem;
            width: 100%;
        }

        .team.right-side { justify-content: flex-end; text-align: left; }
        .team.left-side { justify-content: flex-start; text-align: right; }

        .team span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .team img {
            width: 38px;
            height: 28px;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            border: 1px solid #eee;
            flex-shrink: 0;
        }

        /* منطقة المنتصف (الوقت والنتيجة وحالة البث) */
        .match-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .status-tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .status-tag.live { background: #ffeaec; color: #ff2a55; border: 1px solid #ffcbd4; animation: pulse 2s infinite; }
        .status-tag.not-started { background: #e6fcf5; color: #0c8599; }
        .status-tag.ended { background: #f1f3f5; color: #868e96; }

        .center-display-box {
            background: var(--time-red);
            color: #ffffff;
            font-size: 1.35rem;
            font-weight: 900;
            text-align: center;
            width: 100%;
            padding: 6px 0;
            border-radius: 50px;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.25);
        }

        /* تفاصيل ملعب المباراة */
        .stadium-details {
            text-align: center;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 500;
            margin: 6px 0 20px 0;
            opacity: 0.85;
        }
        .stadium-details i {
            margin-left: 4px;
            color: var(--qatar-gold);
        }

        .msg {
            text-align: center;
            color: var(--qatar-gold);
            padding: 50px 0;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .hidden { display: none !important; }

        /* أزرار المشغل والعودة للجدول */
        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            margin-bottom: 20px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: var(--time-red);
            border-color: var(--time-red);
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }

        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid var(--qatar-gold);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .video-wrapper iframe, .video-wrapper video {
            width: 100%;
            height: 400px;
            border: none;
            display: block;
        }

        /* صندوق السيرفرات البديلة */
        .servers-box {
            background: rgba(44, 2, 22, 0.5);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(188, 198, 149, 0.2);
        }

        .servers-title {
            margin-bottom: 12px;
            font-weight: 700;
            color: var(--qatar-gold);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .servers-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .server-btn {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .server-btn.active, .server-btn:hover {
            background: var(--qatar-gold);
            color: var(--qatar-dark);
            border-color: var(--qatar-gold);
            box-shadow: 0 4px 12px rgba(188, 198, 149, 0.3);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 600px) {
            .main-header-title { font-size: 1.4rem; padding: 8px 30px; }
            .match-card { grid-template-columns: 1fr 95px 1fr; padding: 6px 15px; }
            .team { font-size: 0.9rem; gap: 8px; }
            .team img { width: 30px; height: 22px; }
            .center-display-box { font-size: 1.1rem; padding: 4px 0; }
            .video-wrapper iframe, .video-wrapper video { height: 220px; }
        }
    </style>
</head>
<body>

<div class='main section' id='main'>
    <div class='widget Blog' data-version='1' id='Blog1'>
        <div class='post-body'>

            <div id='app-dynamic-wrapper'>
                <div class='header-table'>
                    <h2 class='main-header-title'>جدول مباريات اليوم</h2>
                    <div>
                        <span class='date-sub' id='live-date-sync'>جاري المزامنة...</span>
                    </div>
                </div>

                <div class='msg' id='state-msg'>جاري جلب مباريات ولقاءات اليوم الحية...</div>
                
                <div class='hidden' id='matches-list'></div>

                <div class='hidden' id='player-view'>
                    <button class='back-btn' onclick='goBack()'><i class='fa-solid fa-arrow-right'/> العودة للجدول</button>
                    
                    <div id='current-match-card'/>
                    <div style='margin-bottom: 15px;'/> 

                    <div class='video-wrapper'>
                        <iframe allowfullscreen='true' class='hidden' id='iframe-player' scrolling='no' src=''/>
                        <video autoplay='' controls='' id='hls-player' playsinline=''/>
                    </div>
                    
                    <div class='servers-box'>
                        <div class='servers-title'><i class='fa-solid fa-layer-group'/> سيرفرات البث الاحتياطية المتوفرة:</div>
                        <div class='servers-list' id='servers-render'></div>
                    </div>
                </div>
            </div>

            <script type='text/javascript'>
                //<![CDATA[
                const WORKER_URL = "https://api.albasritv1.workers.dev/";
                const stateMsg = document.getElementById("state-msg");
                const matchesList = document.getElementById("matches-list");
                const playerView = document.getElementById("player-view");
                const currentMatchCard = document.getElementById("current-match-card");
                const iframePlayer = document.getElementById("iframe-player");
                const hlsPlayer = document.getElementById("hls-player");
                const serversRender = document.getElementById("servers-render");
                const liveDateSync = document.getElementById("live-date-sync");
                let activeHls = null;

                // تحديث التاريخ الحالي تلقائياً بالصيغة العربية العربية الفصحى
                if (liveDateSync) {
                    const options = { weekday: 'long', day: 'numeric', month: 'long' };
                    liveDateSync.innerText = new Date().toLocaleDateString('ar-EG', options);
                }

                function getCleanImg(url) {
                    if (!url) return "https://via.placeholder.com/40x30/ffffff/000000?text=FLAG";
                    let u = url.trim();
                    if (u.startsWith("http://") || u.startsWith("https://")) return u;
                    if (u.startsWith("//")) return "https:" + u;
                    return "https://koooracity.com/" + u.replace(/^\//, '');
                }

                function cleanTime(t) {
                    if(!t) return "";
                    let clean = t.toString().replace(/[⏰&#9200;]/g, '').trim();
                    let parts = clean.match(/(\d{1,2}):(\d{2})/);
                    if (parts) {
                        let hours = parseInt(parts[1]);
                        let minutes = parts[2];
                        let ampm = hours >= 12 ? 'م' : 'ص';
                        hours = hours % 12 || 12;
                        return `${hours}:${minutes} ${ampm}`;
                    }
                    return clean;
                }

                function buildCardHtml(m, statusClass, statusTxt, centerText) {
                    return `
                        <div class="team right-side">
                            <span>${m.team1.name}</span>
                            <img src="${getCleanImg(m.team1.logo)}" onerror="this.src='https://via.placeholder.com/40x30/ffffff/000000?text=FLAG'">
                        </div>
                        <div class="match-info">
                            <div class="status-tag ${statusClass}">${statusTxt}</div>
                            <div class="center-display-box">${centerText}</div>
                        </div>
                        <div class="team left-side">
                            <img src="${getCleanImg(m.team2.logo)}" onerror="this.src='https://via.placeholder.com/40x30/ffffff/000000?text=FLAG'">
                            <span>${m.team2.name}</span>
                        </div>
                    `;
                }

                // الاتصال بـ Worker للـ API
                async function loadData() {
                    try {
                        const res = await fetch(WORKER_URL);
                        const result = await res.json();
                        if (result.success && result.data) {
                            displayData(result.data);
                        } else {
                            stateMsg.innerText = "لا تتوفر مباريات مجدولة حالياً بالسيرفر.";
                        }
                    } catch (e) {
                        stateMsg.innerText = "فشل الاتصال التلقائي بخادم المباريات الرئيسي.";
                    }
                }

                function displayData(list) {
                    stateMsg.classList.add("hidden");
                    matchesList.classList.remove("hidden");
                    matchesList.innerHTML = "";

                    if(list.length === 0) {
                        matchesList.innerHTML = "<div class='msg'>لا توجد مباريات لليوم.</div>";
                        return;
                    }

                    list.forEach(m => {
                        let statusClass = "";
                        let statusTxt = m.status;
                        let centerText = "";
                        const scoreStr = `${m.team1.goals || 0} : ${m.team2.goals || 0}`;
                        
                        let groupName = m.round_name || m.tournament || "بطولة اليوم الإقليمية";

                        if (m.priority === 1) {
                            statusTxt = "مباشر الآن"; statusClass = "live";
                            centerText = scoreStr;
                        } else if (m.priority === 3) {
                            statusTxt = "انتهت"; statusClass = "ended";
                            centerText = scoreStr;
                        } else {
                            statusTxt = "لم تبدأ"; statusClass = "not-started";
                            centerText = cleanTime(m.time);
                        }

                        // رندرة فواصل المجموعات والبطولات تلقائياً لكل مباراة
                        let divGroup = document.createElement("div");
                        divGroup.className = "section-divider";
                        divGroup.innerHTML = `<i class="fa-solid fa-trophy" style="font-size:11px;"></i> ${groupName}`;
                        matchesList.appendChild(divGroup);

                        // بناء الكرت البيضاوي
                        let html = buildCardHtml(m, statusClass, statusTxt, centerText);
                        let divCard = document.createElement("div");
                        divCard.className = "match-card";
                        divCard.innerHTML = html;
                        
                        let stadiumTxt = m.stadium || "استاد المدينة الرياضية الدولي";
                        let divStadium = document.createElement("div");
                        divStadium.className = "stadium-details";
                        divStadium.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${stadiumTxt}`;

                        divCard.onclick = () => {
                            if (currentMatchCard) {
                                currentMatchCard.innerHTML = `
                                    <div class="match-card static-card">${html}</div>
                                    <div class="stadium-details" style="margin-top:10px;">${divStadium.innerHTML}</div>
                                `;
                            }
                            loadLiveLinks(m.link);
                        };

                        matchesList.appendChild(divCard);
                        matchesList.appendChild(divStadium);
                    });
                }

                // جلب روابط البث الخارجي للمباراة المحددة من خلال رابط الـ API المرفق بالمباراة
                async function loadLiveLinks(linkUrl) {
                    matchesList.classList.add("hidden");
                    stateMsg.classList.remove("hidden");
                    stateMsg.innerText = "جاري تحضير مشغل الفيديو وتأمين الاتصال بالبث...";

                    try {
                        const res = await fetch(linkUrl);
                        const result = await res.json();
                        stateMsg.classList.add("hidden");
                        playerView.classList.remove("hidden");
                        serversRender.innerHTML = "";
                        resetStream();

                        if (result.success && result.servers && result.servers.length > 0) {
                            playStream(result.servers[0].url, result.servers[0].type, null);
                            result.servers.forEach((srv, i) => {
                                let btn = document.createElement("button");
                                btn.className = "server-btn";
                                if(i === 0) btn.classList.add("active");
                                
                                let name = srv.name;
                                if(name.includes("M3U")) name = "جودة متعددة HD " + (i + 1);
                                else if(name.includes("Web")) name = "سيرفر رئيسي " + (i + 1);

                                btn.innerText = name;
                                btn.onclick = (e) => playStream(srv.url, srv.type, e.target);
                                serversRender.appendChild(btn);
                            });
                        } else {
                            serversRender.innerHTML = "<div style='color:var(--time-red); font-weight:700; padding:10px;'>روابط البث المباشر قيد التجهيز الآن... تظهر فور انطلاق المباراة.</div>";
                        }
                    } catch(e) {
                        goBack();
                    }
                }

                // معالجة تشغيل الروابط (Iframe أو HLS .m3u8 الذكي) تلقائياً
                function playStream(url, type, btn) {
                    resetStream();
                    if (type === "m3u8" || url.includes(".m3u8")) {
                        iframePlayer.classList.add("hidden");
                        hlsPlayer.classList.remove("hidden");
                        if (Hls.isSupported()) {
                            activeHls = new Hls(); 
                            activeHls.loadSource(url); 
                            activeHls.attachMedia(hlsPlayer);
                            activeHls.on(Hls.Events.MANIFEST_PARSED, () => hlsPlayer.play().catch(()=>{}));
                        } else if (hlsPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                            hlsPlayer.src = url; 
                            hlsPlayer.play().catch(()=>{});
                        }
                    } else {
                        hlsPlayer.classList.add("hidden");
                        iframePlayer.classList.remove("hidden");
                        iframePlayer.src = url;
                    }
                    if(btn) {
                        document.querySelectorAll(".server-btn").forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                    }
                }

                function resetStream() {
                    iframePlayer.src = "";
                    if (activeHls) { activeHls.destroy(); activeHls = null; }
                    hlsPlayer.pause(); 
                    hlsPlayer.removeAttribute('src'); 
                    hlsPlayer.load();
                }

                function goBack() {
                    resetStream();
                    playerView.classList.add("hidden");
                    matchesList.classList.remove("hidden");
                }

                // انطلاق جلب البيانات فور تحميل الصفحة
                loadData();
                //]]>
            </script>

        </div>
    </div>
</div>

</body>
</html>
